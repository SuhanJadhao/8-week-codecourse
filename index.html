<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AetherOS | Engineering Protocol</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e5e5; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #404040; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // FIX 1: Safely inject icons so React doesn't crash when state changes
        const Icon = ({ name, className }) => {
            const iconSvg = window.lucide && window.lucide.icons[name] 
                ? window.lucide.icons[name].toSvg({ class: className }) 
                : '';
            return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };

        const curriculumData = [
            {
                week: 1, title: "Frontend Architecture & Declarative State", icon: "layout",
                days: [
                    { day: 1, objective: "Next.js Initialization", steps: "Execute `npx create-next-app@latest aetheros --typescript --tailwind --app`. Configure Windsurf.", milestone: "Establishment of the local development environment." },
                    { day: 2, objective: "Component Composition", steps: "Deconstruct a static HTML dashboard into isolated React components. Instruct Cascade to explain JSX.", milestone: "Transitioning from monolithic HTML to modular UI architecture." },
                    { day: 3, objective: "Unidirectional Data Flow", steps: "Define TypeScript interfaces for component parameters. Pass simulated telemetry data.", milestone: "Understanding data propagation and strict type definitions." },
                    { day: 4, objective: "State Management", steps: "Implement useState to manage interactive elements. Replace imperative DOM targeting.", milestone: "Grasping the React Virtual DOM lifecycle." },
                    { day: 5, objective: "Server vs. Client Components", steps: "Refactor to strictly isolate Client Components (`\"use client\"`). Move interactivity to leaf nodes.", milestone: "Mastering the Next.js rendering paradigm." },
                    { day: 6, objective: "File-System Routing", steps: "Create nested routes (/dashboard, /agents). Implement persistent navigation layouts.", milestone: "Utilizing server-side routing and handling dynamic URLs." },
                    { day: 7, objective: "Data Fetching & Deployment", steps: "Simulate async fetch in a Server Component. Push repository to GitHub and deploy to Vercel.", milestone: "End-to-end understanding of the Next.js CI/CD pipeline." }
                ]
            },
            {
                week: 2, title: "Rapid Prototyping & Generative UI", icon: "layers",
                days: [
                    { day: 8, objective: "Tailwind CSS Mastery", steps: "Convert legacy CSS to Tailwind utilities. Understand responsive modifiers.", milestone: "Rapid, context-free styling directly within components." },
                    { day: 9, objective: "Prompting v0.dev", steps: "Prompt v0.dev to generate the core AetherOS dashboard. Use aesthetic modifiers.", milestone: "Translating UX requirements into natural language prompts." },
                    { day: 10, objective: "Shadcn UI Primitives", steps: "Execute `npx shadcn-ui@latest init`. Import generated v0.dev components.", milestone: "Establishing a customizable, accessible design system." },
                    { day: 11, objective: "Complex Layout Construction", steps: "Stitch atomic components together to build the primary command center.", milestone: "Building scalable UI architectures for dense data." },
                    { day: 12, objective: "Interactive Modals", steps: "Implement accessible forms for agent configuration using Shadcn UI.", milestone: "Handling user input while maintaining accessibility standards." },
                    { day: 13, objective: "Theming & CSS Variables", steps: "Configure next-themes. Map AetherOS brand colors to CSS variables.", milestone: "Implementing persistent, system-aware theming." },
                    { day: 14, objective: "Windsurf Refactoring", steps: "Instruct Windsurf to clean up v0.dev output and enforce strict TS interfaces.", milestone: "Sanitizing architecture to prevent technical debt." }
                ]
            },
            {
                week: 3, title: "Data Persistence & Security", icon: "database",
                days: [
                    { day: 15, objective: "Relational DB Fundamentals", steps: "Study PostgreSQL concepts. Design schema: users, organizations, agents.", milestone: "Transitioning mental models to relational data integrity." },
                    { day: 16, objective: "Supabase Initialization", steps: "Provision Supabase project. Create tables via SQL. Pull schema locally.", milestone: "Establishing remote DB and syncing with local environment." },
                    { day: 17, objective: "Server-Side Authentication", steps: "Install @supabase/ssr. Configure Next.js server actions for secure sessions.", milestone: "Implementing modern, secure session handling." },
                    { day: 18, objective: "Authentication Interface", steps: "Utilize Shadcn UI for login flows. Wire components to server endpoints.", milestone: "Managing auth state across the frontend." },
                    { day: 19, objective: "Row Level Security (RLS)", steps: "Write PostgreSQL RLS policies ensuring users only access their org data.", milestone: "Securing the DB against cross-tenant exposure." },
                    { day: 20, objective: "Secure Data Fetching", steps: "Create Server Actions to safely insert/retrieve configurations.", milestone: "Executing secure database transactions." },
                    { day: 21, objective: "Route Protection", steps: "Implement Next.js middleware to verify sessions and redirect.", milestone: "Hardening routes and centralized access control." }
                ]
            },
            {
                week: 4, title: "Vercel AI SDK & Intelligence", icon: "brain",
                days: [
                    { day: 22, objective: "LLM Mechanics", steps: "Study tokenization, context windows, temperature, and system prompts.", milestone: "Understanding statistical AI and output guidance." },
                    { day: 23, objective: "API Integration", steps: "Install ai and @ai-sdk/anthropic. Construct API route for Claude.", milestone: "Executing deterministic AI text generation requests." },
                    { day: 24, objective: "Real-Time Streaming", steps: "Implement conversational interface using streamText and useChat.", milestone: "Managing real-time data to overcome HTTP timeouts." },
                    { day: 25, objective: "Structured Outputs", steps: "Force LLM to output JSON conforming to Zod schema via generateObject.", milestone: "Converting probabilistic text into deterministic software inputs." },
                    { day: 26, objective: "Context Management", steps: "Persist conversation histories in Supabase to hydrate context windows.", milestone: "Managing context limits and token costs." },
                    { day: 27, objective: "Generative UI", steps: "Utilize streamUI to stream dynamic React components from LLM response.", milestone: "Blending rendering with AI generation." },
                    { day: 28, objective: "AI Gateway Telemetry", steps: "Route requests through Vercel AI Gateway. Monitor usage limits.", milestone: "Hardening AI infrastructure for production reliability." }
                ]
            }
        ];

        const mentorQuotes = [
            "BITSians don't watch tutorials. We read documentation, break things, and rebuild them stronger.",
            "If you're copy-pasting code without understanding the underlying state mechanics, you're a typist, not an engineer.",
            "Windsurf is an exoskeleton, not a wheelchair. You must architect the solution; the AI just types faster.",
            "Are you struggling with Server Components? Good. Discomfort is the prerequisite for engineering mastery.",
            "Don't tell me what your app is supposed to do. Show me the deployment link.",
            "Technical debt is a tax levied on the lazy. Enforce strict TypeScript interfaces today, or bleed tomorrow."
        ];

        function App() {
            // FIX 2: Load and Save from Local Storage
            const [completedDays, setCompletedDays] = useState(() => {
                try {
                    const saved = localStorage.getItem('aetheros_progress');
                    if (saved) return new Set(JSON.parse(saved));
                } catch (e) {
                    console.error("Failed to load progress");
                }
                return new Set();
            });
            const [activeWeek, setActiveWeek] = useState(1);
            const [quoteIndex, setQuoteIndex] = useState(0);

            const toggleDay = (dayNum) => {
                setCompletedDays(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(dayNum)) {
                        newSet.delete(dayNum);
                    } else {
                        newSet.add(dayNum);
                        setQuoteIndex(Math.floor(Math.random() * mentorQuotes.length));
                    }
                    // Save to browser immediately
                    localStorage.setItem('aetheros_progress', JSON.stringify(Array.from(newSet)));
                    return newSet;
                });
            };

            const activeWeekData = curriculumData.find(w => w.week === activeWeek);
            const totalDays = 28; 
            const progressPercentage = Math.round((completedDays.size / totalDays) * 100);

            const weekProgress = (weekNum) => {
                const weekDays = curriculumData.find(w => w.week === weekNum)?.days || [];
                const completedInWeek = weekDays.filter(d => completedDays.has(d.day)).length;
                return Math.round((completedInWeek / weekDays.length) * 100);
            };

            return (
                <div className="flex flex-col lg:flex-row h-screen bg-[#0a0a0a] text-neutral-200 overflow-hidden">
                    
                    {/* Sidebar */}
                    <div className="w-full lg:w-80 bg-neutral-900 border-r border-neutral-800 flex flex-col shrink-0 z-20">
                        <div className="p-6 border-b border-neutral-800">
                            <div className="flex items-center gap-2 mb-2">
                                <Icon name="cpu" className="w-6 h-6 text-emerald-500" />
                                <h1 className="text-xl font-bold text-white">AetherOS Core</h1>
                            </div>
                            <p className="text-[10px] text-neutral-500 font-mono tracking-widest uppercase mb-4">Engineering Protocol // BITS Pilani</p>
                            
                            <div className="space-y-2">
                                <div className="flex justify-between text-xs font-mono">
                                    <span className="text-neutral-400">System Integration</span>
                                    <span className="text-emerald-500">{progressPercentage}%</span>
                                </div>
                                <div className="h-1.5 w-full bg-neutral-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${progressPercentage}%` }} />
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-1">
                            {curriculumData.map((week) => {
                                const isActive = activeWeek === week.week;
                                const isCompleted = weekProgress(week.week) === 100;
                                return (
                                    <button
                                        key={week.week}
                                        onClick={() => setActiveWeek(week.week)}
                                        className={`w-full text-left flex items-center gap-3 p-3 rounded-lg transition-all
                                            ${isActive ? 'bg-neutral-800 text-white shadow-md' : 'hover:bg-neutral-800/50 text-neutral-400'}
                                        `}
                                    >
                                        <div className={`p-2 rounded-md ${isActive ? 'bg-emerald-500/10 text-emerald-500' : 'bg-neutral-800'}`}>
                                            <Icon name={week.icon} className="w-4 h-4" />
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="text-xs font-bold uppercase tracking-tight">Week {week.week}</div>
                                            <div className="text-[10px] truncate opacity-60">{week.title}</div>
                                        </div>
                                        {isCompleted ? (
                                            <Icon name="check-circle" className="w-4 h-4 text-emerald-500 shrink-0" />
                                        ) : (
                                            <div className="text-[10px] font-mono text-neutral-500">{weekProgress(week.week)}%</div>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 flex flex-col h-full overflow-hidden relative">
                        
                        {/* Header / Mentor Console */}
                        <div className="p-6 border-b border-neutral-800 bg-neutral-900/50 shrink-0 z-10 relative">
                            <div className="max-w-4xl mx-auto flex gap-4 items-start">
                                <div className="p-2.5 bg-neutral-800 rounded border border-neutral-700 shadow-inner">
                                    <Icon name="zap" className="w-5 h-5 text-yellow-500" />
                                </div>
                                <div>
                                    <h2 className="text-[11px] font-bold text-neutral-400 uppercase tracking-widest mb-1 flex items-center gap-2">
                                        <Icon name="target" className="w-3 h-3" /> Mentor's Console
                                    </h2>
                                    <p className="text-emerald-400/90 font-mono text-sm leading-relaxed">
                                        {'>'} {mentorQuotes[quoteIndex]}
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Timeline View */}
                        <div className="flex-1 overflow-y-auto p-6 lg:p-12 relative z-0">
                            <div className="max-w-4xl mx-auto">
                                
                                <div className="mb-12">
                                    <div className="inline-flex items-center gap-2 px-2.5 py-1 rounded bg-emerald-500/10 text-emerald-500 text-[10px] font-mono font-bold tracking-widest mb-4 border border-emerald-500/20">
                                        MODULE 0{activeWeek}
                                    </div>
                                    <h2 className="text-3xl lg:text-4xl font-bold text-white mb-3 tracking-tight">{activeWeekData.title}</h2>
                                    <div className="flex items-center gap-4 text-xs font-mono text-neutral-500">
                                        <span className="flex items-center gap-1.5"><Icon name="activity" className="w-3.5 h-3.5" /> 7 Operational Days</span>
                                        <span>•</span>
                                        <span className="text-emerald-500/70">{weekProgress(activeWeek)}% Module Completion</span>
                                    </div>
                                </div>

                                {/* THE TIMELINE */}
                                <div className="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-neutral-800 before:to-transparent">
                                    {activeWeekData.days.map((day) => {
                                        const isDone = completedDays.has(day.day);
                                        
                                        return (
                                            <div key={day.day} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                                                
                                                {/* Timeline Dot */}
                                                <div className="flex items-center justify-center w-10 h-10 rounded-full border-4 border-[#0a0a0a] bg-neutral-900 shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow-sm z-10 transition-colors duration-300">
                                                    {isDone ? (
                                                        <Icon name="check" className="w-4 h-4 text-emerald-500" />
                                                    ) : (
                                                        <span className="text-[11px] font-mono font-bold text-neutral-500 group-hover:text-white transition-colors">{day.day}</span>
                                                    )}
                                                </div>

                                                {/* Timeline Card */}
                                                <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-5 rounded-xl border border-neutral-800 bg-neutral-900/80 hover:bg-neutral-900 hover:border-neutral-700 transition-all cursor-pointer shadow-sm"
                                                     onClick={() => toggleDay(day.day)}>
                                                    
                                                    <div className="flex justify-between items-start mb-3">
                                                        <h3 className={`font-bold text-base tracking-tight ${isDone ? 'text-neutral-500 line-through decoration-emerald-500/30' : 'text-neutral-100'}`}>
                                                            {day.objective}
                                                        </h3>
                                                        <div className={`shrink-0 ml-4 rounded-full p-1 border-2 transition-colors ${isDone ? 'border-emerald-500 bg-emerald-500 text-white' : 'border-neutral-700 text-transparent group-hover:border-neutral-500'}`}>
                                                            <Icon name="check" className="w-3 h-3" />
                                                        </div>
                                                    </div>

                                                    <div className={`space-y-3 transition-opacity duration-300 ${isDone ? 'opacity-40' : 'opacity-100'}`}>
                                                        <div className="bg-black/40 rounded p-3 text-[13px] text-neutral-400 font-mono leading-relaxed border border-neutral-800/50 shadow-inner">
                                                            <span className="text-emerald-500/70 mr-2">$</span>
                                                            {day.steps}
                                                        </div>
                                                        
                                                        <div className="flex gap-2 items-start text-[11px] text-neutral-400 bg-neutral-800/30 p-2.5 rounded border border-neutral-800/50">
                                                            <Icon name="chevron-right" className="w-3.5 h-3.5 text-emerald-500 shrink-0" />
                                                            <span><strong className="text-neutral-300">Milestone:</strong> {day.milestone}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                
                                <div className="h-20"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
